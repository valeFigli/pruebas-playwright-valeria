name: Playwright Tests (Pipeline de Calidad)
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# 🚀 FORZAMOS A GITHUB ACTIONS A USAR NODE 24 PARA EVITAR EL WARNING DE DEPRECACIÓN
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el código de GitHub
      uses: actions/checkout@v4

    - name: 2. Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: 3. Instalar dependencias del proyecto (package.json)
      run: npm ci

    - name: 4. Instalar los navegadores de Playwright
      run: npx playwright install --with-deps

    - name: 5. Ejecutar todas las Pruebas (Web, API y Mobile)
      run: npx playwright test

    - name: 6. Guardar Reporte de resultados como Artefacto
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30